name: Build and Release WebMConverter

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore WebMConverter.csproj

    - name: Build project
      run: dotnet build WebMConverter.csproj -c Release --no-restore

    - name: Compress Release Files
      run: |
        powershell Compress-Archive -Path bin\Release\net8.0-windows\* -DestinationPath WebMConverter-GPU.zip
      shell: cmd

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/master'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          Automated compilation of WebMConverter with GPU acceleration (NVENC) and .NET 8.0 support.
          
          ### Features in this release:
          * **NVIDIA GPU Acceleration (NVENC)**: Direct H.264 & H.265 encoding support.
          * **Bug Fixes**: Resolved the `-crf` argument and two-pass crashes on GPU encoding.
          * **Platform Upgrade**: Migrated configuration files and references to modern .NET 8.0 (Windows).
          * **Fixed Configuration Crashes**: Cleaned legacy configuration tags causing startup crashes.
          * **Disabled Auto-Updates**: Prevents the application from overwriting local working GPU binaries.
        draft: false
        prerelease: false
        files: WebMConverter-GPU.zip
